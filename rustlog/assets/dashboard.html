<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RustLog live</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #0f1419; color: #e6edf3; }
    header { padding: 12px 16px; background: #161b22; border-bottom: 1px solid #30363d; }
    pre { margin: 0; padding: 16px; white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.45; }
    .status { font-size: 12px; color: #8b949e; }
  </style>
</head>
<body>
  <header>
    <strong>RustLog</strong> — live matched lines
    <div class="status" id="st">connecting…</div>
  </header>
  <pre id="log"></pre>
  <script>
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(proto + '://' + location.host + '/ws');
    const log = document.getElementById('log');
    const st = document.getElementById('st');
    ws.onopen = () => { st.textContent = 'connected'; };
    ws.onclose = () => { st.textContent = 'disconnected'; };
    ws.onerror = () => { st.textContent = 'error'; };
    ws.onmessage = (ev) => {
      log.textContent += ev.data + '\n';
    };
  </script>
</body>
</html>
